<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: system-ui, sans-serif;
            background: #f0f2f5;
        }
        .calc {
            width: 320px; background: #fff; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); overflow: hidden;
        }
        .display {
            background: #1a1a2e; color: #fff; padding: 24px 20px;
            text-align: right; font-size: 2rem; font-weight: 300;
            min-height: 80px; word-break: break-all;
        }
        .display .sub { font-size: 1rem; color: #888; min-height: 24px; }
        .buttons {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
            background: #ddd;
        }
        .buttons button {
            padding: 20px; font-size: 1.2rem; border: none;
            background: #fff; cursor: pointer; transition: 0.1s;
        }
        .buttons button:hover { background: #f0f0f0; }
        .buttons button:active { background: #ddd; }
        .buttons .op { background: #f8f9fa; color: #e67e22; font-weight: bold; }
        .buttons .op:hover { background: #eee; }
        .buttons .eq { background: #e67e22; color: #fff; }
        .buttons .eq:hover { background: #d35400; }
        .buttons .span-2 { grid-column: span 2; }
        .buttons .clear { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="calc">
        <div class="display">
            <div class="sub" id="sub-display"></div>
            <div id="display">0</div>
        </div>
        <div class="buttons">
            <button class="clear span-2" onclick="clearAll()">AC</button>
            <button class="op" onclick="input('%')">%</button>
            <button class="op" onclick="input('/')">÷</button>
            <button onclick="input('7')">7</button>
            <button onclick="input('8')">8</button>
            <button onclick="input('9')">9</button>
            <button class="op" onclick="input('*')">×</button>
            <button onclick="input('4')">4</button>
            <button onclick="input('5')">5</button>
            <button onclick="input('6')">6</button>
            <button class="op" onclick="input('-')">−</button>
            <button onclick="input('1')">1</button>
            <button onclick="input('2')">2</button>
            <button onclick="input('3')">3</button>
            <button class="op" onclick="input('+')">+</button>
            <button onclick="input('0')">0</button>
            <button onclick="input('.')">.</button>
            <button onclick="backspace()">⌫</button>
            <button class="eq" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let subDisplay = document.getElementById('sub-display');

        function input(val) {
            let cur = display.textContent;
            if (cur === '0' && val !== '.') {
                display.textContent = val;
            } else {
                display.textContent += val;
            }
        }

        function clearAll() {
            display.textContent = '0';
            subDisplay.textContent = '';
        }

        function backspace() {
            let cur = display.textContent;
            display.textContent = cur.length > 1 ? cur.slice(0, -1) : '0';
        }

        function calculate() {
            try {
                let expr = display.textContent
                    .replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let result = Function('"use strict"; return (' + expr + ')')();
                subDisplay.textContent = display.textContent + ' =';
                display.textContent = Number.isFinite(result) ? result : 'Error';
            } catch {
                display.textContent = 'Error';
            }
        }

        document.addEventListener('keydown', (e) => {
            if ('0123456789.+-*/%'.includes(e.key)) input(e.key);
            else if (e.key === 'Enter') calculate();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
